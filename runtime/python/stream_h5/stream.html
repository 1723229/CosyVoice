<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
<textarea name="" rows="10" id="input" name="input"></textarea>
<div>
    <label for="stream">流式</label>
    <input type="checkbox" id="stream" name="stream">
</div>
<button onclick="sourceOpen()">请求</button>
<audio id="niu" src="" controls autoplay></audio>
<script>
    const audio = document.getElementById('niu')

    async function sourceOpen() {
        const input = document.getElementById('input').value
        console.log(input)
        const stream = document.getElementById('stream').checked
        console.log(stream)

        fetch("http://10.200.57.5:45000/queue/join", {
            method: 'post',
            body: JSON.stringify({
                username: 'admin',
                session_hash: 'dssf',
                input: input
            }),
            headers: {
                "Content-Type": "application/json",
            },
        }).then(async res => {
            const {username, session_hash, run} = await res.json()
            console.log(username, session_hash, run)
            const url = `http://10.200.57.5:45000/queue/data?username=${username}&session_hash=${session_hash}&run=${run}`
            const sse = new EventSource(url);

            sse.onopen = (e) => {
                console.log(e)
            }
            sse.onmessage = (e) => {
                const data = JSON.parse(e.data)
                if (data.isOpen) {
                    console.log(data.url)
                    audio.src = `http://10.200.57.5:45000/${data.url}`
                    audio.play()
                }
            };

            sse.addEventListener("error", (e) => {
                console.log(e)
                sse.close()
            })
        })


    }

</script>
</body>

</html>
